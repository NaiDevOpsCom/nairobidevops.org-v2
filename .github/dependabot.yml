version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    # Ignore major version bumps for production deps to force manual review.
    # These packages frequently introduce breaking changes that require code updates.
    ignore:
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "motion"
        update-types: ["version-update:semver-major"]
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
    groups:
      frontend-dependencies:
        patterns:
          - "@radix-ui/*"
          - "@tanstack/*"
          - "@cloudinary/*"
          - "@hookform/*"
          - "@unpic/*"
          - "@vercel/*"
          - "class-variance-authority"
          - "clsx"
          - "cmdk"
          - "date-fns"
          - "embla-carousel*"
          - "ical.js"
          - "input-otp"
          - "lucide-react"
          - "motion"
          - "react"
          - "react-dom"
          - "react-*"
          - "recharts"
          - "tailwind-merge"
          - "vaul"
          - "wouter"
          - "zod"
        exclude-patterns:
          - "react-day-picker"
          - "eslint*"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "@vitest/*"
          - "prettier"
          - "typescript"
          - "tsx"
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
          - "esbuild"
          - "terser"
      tooling:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "@vitest/*"
          - "prettier"
          - "typescript"
          - "tsx"
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
          - "esbuild"
          - "terser"
