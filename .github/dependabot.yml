version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      frontend-dependencies:
        patterns:
          - "@radix-ui/*"
          - "@tanstack/*"
          - "@cloudinary/*"
          - "@hookform/*"
          - "@unpic/*"
          - "@vercel/*"
          - "class-variance-authority"
          - "clsx"
          - "cmdk"
          - "date-fns"
          - "embla-carousel*"
          - "ical.js"
          - "input-otp"
          - "lucide-react"
          - "motion"
          - "react"
          - "react-dom"
          - "react-*"
          - "recharts"
          - "tailwind-merge"
          - "vaul"
          - "wouter"
          - "zod"
        exclude-patterns:
          - "eslint*"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "@vitest/*"
          - "prettier"
          - "typescript"
          - "tsx"
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
          - "esbuild"
          - "terser"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      tooling:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "@vitest/*"
          - "prettier"
          - "typescript"
          - "tsx"
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/*"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
          - "esbuild"
          - "terser"
