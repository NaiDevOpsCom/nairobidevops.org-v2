
# Dependency Review Policy
# ─────────────────────────────────────────────────────────────
# This file governs license and vulnerability policy for all
# pull requests via actions/dependency-review-action.
#
# Reviewed: 2026-06-25
# Reviewer:  [Your Name / Legal Team sign-off]
#
# IMPORTANT — compound SPDX expressions (e.g. "ISC AND JSON AND MIT")
# are NOT supported in allow-licenses. The action only matches
# individual SPDX identifiers in that list. To exempt a specific
# package that carries a compound/non-SPDX license, use
# allow-dependencies-licenses with its PURL instead.
# ─────────────────────────────────────────────────────────────

fail-on-severity: moderate

vulnerability-check: true
license-check: true

# ─────────────────────────────────────────────────────────────
# APPROVED INDIVIDUAL LICENSES
# ─────────────────────────────────────────────────────────────
# Standard permissive licenses — no restrictions on commercial use.
allow-licenses:
  - MIT
  - ISC
  - Apache-2.0
  - BSD-2-Clause
  - BSD-3-Clause
  - Unlicense
  - CC0-1.0
  - 0BSD
  - MPL-2.0
  # JSON (Crockford) — "shall be used for Good, not Evil" clause.
  # Not OSI-approved; widely present in the D3/Victory ecosystem.
  # Listed here for belt-and-suspenders coverage alongside the
  # PURL exception below. Legal review: [Date] by [Team/Person].
  - JSON

# ─────────────────────────────────────────────────────────────
# PACKAGE-LEVEL LICENSE EXCEPTIONS (PURL format)
# ─────────────────────────────────────────────────────────────
# Use this section for packages that carry compound or non-SPDX
# license expressions that the action cannot match via allow-licenses.
# These packages are still scanned for VULNERABILITIES — only their
# license check is bypassed.
allow-dependencies-licenses:
  # victory-vendor@37.x — transitive dependency via recharts@3.x.
  # Reports license "ISC AND JSON AND MIT" from the GitHub Dependency
  # Graph API. The action does not support compound SPDX expressions
  # in allow-licenses, so we exempt this specific package by PURL.
  # The JSON license clause ("Good not Evil") is a known nuisance in
  # the D3 ecosystem and is accepted as low-risk for front-end tooling.
  # Track for removal: evaluate recharts alternatives that drop victory-vendor.
  - "pkg:npm/victory-vendor"
