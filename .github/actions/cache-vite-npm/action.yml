name: Cache Vite and npm
description: Set up Node.js with npm cache and restore Vite build cache.
inputs:
  node-version:
    description: Node.js version to use
    required: true
runs:
  using: composite
  steps:
    - name: Setup Node.js (with npm cache)
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: "npm"
        cache-dependency-path: |
          frontend/package-lock.json

    - name: Cache Vite build cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: |
          frontend/node_modules/.vite
          frontend/client/node_modules/.vite
        key: vite-cache-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('frontend/package-lock.json', 'frontend/vite.config.ts') }}
        restore-keys: |
          vite-cache-${{ runner.os }}-${{ inputs.node-version }}-
