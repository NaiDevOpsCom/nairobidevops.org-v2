name: Deploy Backend to Production

concurrency:
  group: ndc-redesign-backend-production
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-prod.yml"

jobs:
  validate:
    name: Quality Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.2
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP formatting check (PHP-CS-Fixer)
        run: composer run format:check

      - name: PHP unit tests (PHPUnit)
        run: composer run test

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    permissions: {}

    outputs:
      release_timestamp: ${{ steps.timestamp.outputs.timestamp }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Generate Release Timestamp
        id: timestamp
        run: echo "timestamp=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH
        env:
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh

          if [ -z "$KNOWN_HOSTS" ]; then
            echo "KNOWN_HOSTS is empty."
            exit 1
          fi

          if [ -z "$SSH_PRIVATE_KEY" ] && [ -z "$SSH_PRIVATE_KEY_B64" ]; then
            echo "SSH_PRIVATE_KEY and SSH_PRIVATE_KEY_B64 are both empty."
            exit 1
          fi

          printf '%s\n' "$KNOWN_HOSTS" | sed 's/\r$//' > ~/.ssh/known_hosts

          if [ -n "$SSH_PRIVATE_KEY_B64" ]; then
            if ! printf '%s' "$SSH_PRIVATE_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/id_rsa; then
              echo "SSH_PRIVATE_KEY_B64 could not be base64-decoded."
              exit 1
            fi
          else
            KEY_CONTENT="$SSH_PRIVATE_KEY"
            if printf '%s' "$KEY_CONTENT" | grep -q '\\n'; then
              KEY_CONTENT="$(printf '%s' "$KEY_CONTENT" | sed 's/\\n/\n/g')"
            fi
            printf '%s\n' "$KEY_CONTENT" | sed 's/\r$//' > ~/.ssh/id_rsa
          fi

          chmod 600 ~/.ssh/id_rsa ~/.ssh/known_hosts

          if grep -qE '^(ssh-rsa|ssh-ed25519|ecdsa-sha2-)' ~/.ssh/id_rsa; then
            echo "The deploy key secret contains a public key, not a private key."
            exit 1
          fi

          if ! grep -qE '^-----BEGIN .+PRIVATE KEY-----$' ~/.ssh/id_rsa; then
            echo "The deploy key secret is not a valid private key file."
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            echo "The deploy key secret could not be parsed by ssh-keygen."
            exit 1
          fi

      - name: Create Release Directory on Server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          RELEASE_TIMESTAMP: ${{ steps.timestamp.outputs.timestamp }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key_path: /home/runner/.ssh/id_rsa
          port: ${{ secrets.REMOTE_PORT || 22 }}
          envs: REMOTE_USER,RELEASE_TIMESTAMP
          script: |
            set -euo pipefail
            mkdir -p "/home/$REMOTE_USER/backend-releases/$RELEASE_TIMESTAMP"

      - name: Package and Sync Backend
        env:
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || 22 }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          RELEASE_TIMESTAMP: ${{ steps.timestamp.outputs.timestamp }}
        run: |
          set -euo pipefail

          if [ ! -d "backend" ]; then
            echo "backend/ directory not found"
            exit 1
          fi

          tar --exclude='./config.php' \
              --exclude='./config.local.php' \
              --exclude='./config.staging.php' \
              --exclude='./.git' \
              -czf backend-release.tar.gz -C backend .

          scp -P "${REMOTE_PORT:-22}" \
            -o StrictHostKeyChecking=yes \
            backend-release.tar.gz \
            "${REMOTE_USER}@${REMOTE_HOST}:/home/${REMOTE_USER}/backend-releases/${RELEASE_TIMESTAMP}/"

      - name: Extract Release on Server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          RELEASE_TIMESTAMP: ${{ steps.timestamp.outputs.timestamp }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key_path: /home/runner/.ssh/id_rsa
          port: ${{ secrets.REMOTE_PORT || 22 }}
          envs: REMOTE_USER,RELEASE_TIMESTAMP
          script: |
            set -euo pipefail
            RELEASE_DIR="/home/$REMOTE_USER/backend-releases/$RELEASE_TIMESTAMP"
            tar -xzf "$RELEASE_DIR/backend-release.tar.gz" -C "$RELEASE_DIR"
            rm "$RELEASE_DIR/backend-release.tar.gz"

            ln -sf "/home/$REMOTE_USER/config/backend-config.php" \
                   "$RELEASE_DIR/config.php"

      - name: Atomically Switch Symlink & Clean Old Releases
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET_LINK: ${{ secrets.BACKEND_REMOTE_PATH }}
          RELEASE_TIMESTAMP: ${{ steps.timestamp.outputs.timestamp }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key_path: /home/runner/.ssh/id_rsa
          port: ${{ secrets.REMOTE_PORT || 22 }}
          envs: REMOTE_USER,TARGET_LINK,RELEASE_TIMESTAMP
          script: |
            set -euo pipefail

            RELEASE_DIR="/home/$REMOTE_USER/backend-releases/$RELEASE_TIMESTAMP"
            TMP_LINK="${TARGET_LINK}.tmp"

            if [ -e "$TARGET_LINK" ] && [ ! -L "$TARGET_LINK" ]; then
              echo "CRITICAL ERROR: $TARGET_LINK is not a symlink — aborting."
              exit 1
            fi

            ln -sfn "$RELEASE_DIR" "$TMP_LINK"
            mv -Tf "$TMP_LINK" "$TARGET_LINK"

            # Keep last 5 backend releases (matches frontend pattern)
            cd "/home/$REMOTE_USER/backend-releases"
            ls -1t | tail -n +6 | tr '\n' '\0' | xargs -0 -r rm -rf 2>/dev/null || true

            echo "Backend deployment successful."

  notify:
    needs: [validate, deploy]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Send Status Email
        continue-on-error: true
        uses: dawidd6/action-send-mail@42942bc2f8fba4e611b459a018967a6a7c78c68c
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: >-
            ${{ (needs.validate.result == 'success' && needs.deploy.result == 'success') && '✅' || '❌' }}
            Backend Production Deploy
            ${{ (needs.validate.result == 'success' && needs.deploy.result == 'success') && 'Successful' || 'Failed' }}
            - ${{ github.repository }}
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            ${{ (needs.validate.result == 'success' && needs.deploy.result == 'success') && 'Backend deployed to production successfully.' || 'Backend production deployment FAILED.' }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}