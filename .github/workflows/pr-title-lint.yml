name: PR Title Lint

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

jobs:
  validate:
    name: Validate Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - id: generate_title
        name: Auto-generate title for staging promotion PRs
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request || {};
            const number = pr.number;
            if (!pr.base || !pr.head) return 'skipped';
            const promotionBranches = new Set(['staging', 'pre-staging']);
            if (pr.base.ref !== 'main' || !promotionBranches.has(pr.head.ref)) return 'skipped';

            const parseVersion = (tag) => {
              const match = /^v?(\d+)\.(\d+)\.(\d+)$/.exec(tag || '');
              return match ? match.slice(1).map(Number) : null;
            };

            const compareVersions = (a, b) => {
              for (let i = 0; i < 3; i++) {
                if (a[i] !== b[i]) return a[i] - b[i];
              }
              return 0;
            };

            const incrementVersion = ([major, minor, patch], bump) => {
              if (bump === 'major') return [major + 1, 0, 0];
              if (bump === 'minor') return [major, minor + 1, 0];
              return [major, minor, patch + 1];
            };

            const getLatestVersion = async () => {
              const tags = await github.paginate(github.rest.repos.listTags, {
                owner, repo, per_page: 100
              });
              const versions = tags
                .map(tag => parseVersion(tag.name))
                .filter(Boolean)
                .sort(compareVersions);
              if (versions.length) return versions[versions.length - 1];

              const { data } = await github.rest.repos.getContent({
                owner, repo, path: 'frontend/package.json', ref: pr.base.sha
              });
              const packageJson = JSON.parse(Buffer.from(data.content, data.encoding).toString('utf8'));
              return parseVersion(packageJson.version) || [0, 0, 0];
            };

            const getReleaseBump = async () => {
              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner, repo, pull_number: number, per_page: 100
              });
              const messages = commits.map(commit => commit.commit.message || '');
              if (messages.some(message => /BREAKING CHANGE|^[a-z]+(?:\(.*\))?!: ?/m.test(message))) return 'major';
              if (messages.some(message => /^feat(\(.*\))?:/m.test(message))) return 'minor';
              return 'patch';
            };

            const currentVersion = await getLatestVersion();
            const nextVersion = incrementVersion(currentVersion, await getReleaseBump()).join('.');
            const title = (pr.title || '').trim();
            const branchLike = /^(pre-)?staging(\/.*)?$/i.test(title);
            const ccPattern = /^(feat|fix|style|content|chore|docs|refactor|ci|build|test|security)(\([^\)]*\))?(!)?:\s+[a-z].*/;
            const promotionTitlePattern = /^chore:\s+promote\s+(pre-)?staging\s+to\s+main( for v\d+\.\d+\.\d+)?$/i;
            const expectedTitle = `chore: promote ${pr.head.ref} to main for v${nextVersion}`;
            const shouldUsePromotionTitle =
              !title ||
              branchLike ||
              !ccPattern.test(title) ||
              (promotionTitlePattern.test(title) && title !== expectedTitle);
            if (shouldUsePromotionTitle) {
              const newTitle = expectedTitle;
              try {
                await github.rest.pulls.update({ owner, repo, pull_number: number, title: newTitle });
                console.log(`Updated PR #${number} title to: ${newTitle}`);
                return 'updated';
              } catch (e) {
                console.error('Failed to update PR title:', e.message);
                throw e;
              }
            }
            return 'unchanged';

      # -----------------------------------------------------------------------
      # IMPORTANT: Skip this step when generate_title just updated the title.
      #
      # WHY: `amannn/action-semantic-pull-request` reads the PR title from the
      # webhook event payload, which is snapshotted at workflow start and is
      # NEVER refreshed mid-run — even after a successful `pulls.update` API
      # call. If we let lint run after an update it reads the stale
      # promotion-branch title and fails, producing a false-positive lint error.
      #
      # When generate_title returns 'updated', the new title is always the
      # valid Conventional Commit "chore: promote <branch> to main for vX.Y.Z", so
      # skipping lint is entirely safe — there is nothing to validate.
      # -----------------------------------------------------------------------
      - name: Lint PR Title
        id: lint
        if: steps.generate_title.outputs.result != 'updated'
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            style
            content
            chore
            docs
            refactor
            ci
            build
            test
            security
          requireScope: false
          subjectPattern: "^[a-z].*"
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.
          validateSingleCommit: false
          wip: true
          ignoreLabels: |
            automated
            dependencies

      - name: Post help comment on failure
        if: failure() && steps.lint.outcome == 'failure' && steps.generate_title.outputs.result != 'updated'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title;
            const { owner, repo } = context.repo;
            const number = pr.number;
            
            const body = [
              'Thanks for opening this PR! The title doesn\'t match our required format.',
              '',
              '**PR titles must follow [Conventional Commits](https://www.conventionalcommits.org/):**',
              '',
              '| Type | Example |',
              '|------|---------|',
              '| `feat:` | `feat: add speaker search filter` |',
              '| `fix:` | `fix: resolve mobile nav overflow` |',
              '| `chore:` | `chore: update dependencies` |',
              '| `docs:` | `docs: update contributing guide` |',
              '| `refactor:` | `refactor: extract SpeakerCard component` |',
              '| `ci:` | `ci: speed up build workflow` |',
              '| `build:` | `build: bump vite to v6` |',
              '| `test:` | `test: add SpeakerCard unit tests` |',
              '| `security:` | `security: fix XSS in search input` |',
              '',
              '**Current title:** `' + title + '`',
              '',
              '**Tip:** You can edit the title directly in this PR\'s title field above.',
              'No need to close and reopen — just edit and the check will re-run.'
            ].join('\n');
            
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: number
            });
            
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Conventional Commits')
            );
            
            if (!existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: number, body
              });
            }
