name: Validate Security Policy Generation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, pre-staging]
  pull_request:
    branches: [main, pre-staging]

jobs:
  validate-policy:
    name: Verify Security Headers & Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint lockfile (registry/https)
        run: |
          npx lockfile-lint \
            --path package-lock.json \
            --type npm \
            --validate-https \
            --allowed-hosts npm \
            --validate-integrity \
            --validate-package-names

      - name: Generate Security Configuration
        run: npm run security:generate

      - name: Check for uncommitted changes
        run: |
          if ! git -C "$GITHUB_WORKSPACE" diff --quiet -- frontend/client/public/.htaccess; then
            echo "::error::Generated security files do not match frontend/security-policy.json. Please run 'npm run security:generate' from frontend/ and commit the changes."
            git -C "$GITHUB_WORKSPACE" status
            git -C "$GITHUB_WORKSPACE" diff -- frontend/client/public/.htaccess
            exit 1
          else
            echo "SUCCESS: Generated security files match the policy."
          fi
