name: Validate Security Policy Generation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, pre-staging]
  pull_request:
    branches: [main, pre-staging]

jobs:
  validate-policy:
    name: Verify Security Headers & Rules
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint lockfile (registry/https)
        run: |
          npx lockfile-lint \
            --path package-lock.json \
            --type npm \
            --validate-https \
            --allowed-hosts npm \
            --validate-integrity \
            --validate-package-names

      - name: Generate Security Configuration
        run: npm run security:generate

      - name: Check for uncommitted changes
        run: |
          if ! git diff --quiet -- vercel.json client/public/.htaccess; then
            echo "::error::Security policy files (vercel.json, .htaccess) do not match security-policy.json. Please run 'npm run security:generate' locally and commit the changes."
            git status
            git diff
            exit 1
          else
            echo "SUCCESS: Generated security files match the policy."
          fi
