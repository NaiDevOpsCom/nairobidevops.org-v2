name: Deploy to cPanel

concurrency:
  group: deploy-production
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy.yml"
      - ".github/actions/cache-vite-npm/action.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      # 1. Check out the code
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # 2. Install Node.js
      - name: Setup Node.js and Cache
        uses: ./.github/actions/cache-vite-npm
        with:
          node-version: 22

      # 3. Install dependencies and Build
      #
      # Vite automatically copies everything in frontend/client/public/ into dist/ verbatim.
      # This means these files land in dist/ as part of the build — no separate
      # upload step needed for them:
      #   frontend/client/public/api/imagesCloudinary.php  →  dist/api/imagesCloudinary.php
      #   frontend/client/public/api/luma.php              →  dist/api/luma.php
      #   frontend/client/public/.htaccess                 →  dist/.htaccess
      #   frontend/client/public/analytics.js              →  dist/analytics.js
      #   frontend/client/public/robots.txt                →  dist/robots.txt
      #
      - name: Install and Build
        run: |
          npm ci
          npm run build
          # Validate build output
          if [ ! -d "dist" ] || [ -z "$(ls -A dist)" ]; then
            echo "Error: dist/ directory is missing or empty"
            exit 1
          fi
          # Confirm PHP proxy files made it into the build.
          # Catches accidental removal or path renames before they reach production.
          if [ ! -f "dist/api/imagesCloudinary.php" ]; then
            echo "Error: dist/api/imagesCloudinary.php is missing from build output"
            exit 1
          fi
          if [ ! -f "dist/api/luma.php" ]; then
            echo "Error: dist/api/luma.php is missing from build output"
            exit 1
          fi

      # 4. Generate and Validate Sitemap & Robots.txt
      - name: Generate and Validate Sitemap & Robots.txt
        run: |
          npm run sitemap:generate
          npm run sitemap:validate

      # 5. Upload Build Artifact
      - name: Upload Build Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: frontend/dist
          retention-days: 1
          include-hidden-files: true # Required — ensures .htaccess is included in artifact

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions: {}

    outputs:
      release_timestamp: ${{ steps.timestamp.outputs.timestamp }}

    steps:
      # 1. Download Build Artifact
      - name: Download Build Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist

      # 2. Generate Release Timestamp
      - name: Generate Release Timestamp
        id: timestamp
        run: echo "timestamp=$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      # 3. Setup SSH
      - name: Setup SSH
        env:
          KNOWN_HOSTS: ${{ secrets.KNOWN_HOSTS }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh

          if [ -z "$KNOWN_HOSTS" ]; then
            echo "❌ KNOWN_HOSTS is empty. Confirm it is set in the production environment secrets."
            exit 1
          fi

          if [ -z "$SSH_PRIVATE_KEY" ] && [ -z "$SSH_PRIVATE_KEY_B64" ]; then
            echo "❌ SSH_PRIVATE_KEY and SSH_PRIVATE_KEY_B64 are both empty."
            echo "   Set SSH_PRIVATE_KEY_B64 to the base64-encoded private key, or set SSH_PRIVATE_KEY to the raw private key text."
            exit 1
          fi

          printf '%s\n' "$KNOWN_HOSTS" | sed 's/\r$//' > ~/.ssh/known_hosts

          if [ -n "$SSH_PRIVATE_KEY_B64" ]; then
            if ! printf '%s' "$SSH_PRIVATE_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/id_rsa; then
              echo "❌ SSH_PRIVATE_KEY_B64 could not be base64-decoded."
              echo "   Regenerate it from the private key file and update the production environment secret."
              exit 1
            fi
          else
            KEY_CONTENT="$SSH_PRIVATE_KEY"
            if printf '%s' "$KEY_CONTENT" | grep -q '\\n'; then
              KEY_CONTENT="$(printf '%s' "$KEY_CONTENT" | sed 's/\\n/\n/g')"
            fi
            printf '%s\n' "$KEY_CONTENT" | sed 's/\r$//' > ~/.ssh/id_rsa
          fi

          chmod 600 ~/.ssh/id_rsa ~/.ssh/known_hosts

          if grep -qE '^(ssh-rsa|ssh-ed25519|ecdsa-sha2-)' ~/.ssh/id_rsa; then
            echo "❌ The deploy key secret contains a public key, not a private key."
            echo "   Put the public key in cPanel authorized_keys and the private key in the GitHub secret."
            exit 1
          fi

          if ! grep -qE '^-----BEGIN .+PRIVATE KEY-----$' ~/.ssh/id_rsa; then
            echo "❌ The deploy key secret is not a valid private key file."
            echo "   Ensure the secret includes the full private key, including the BEGIN/END lines."
            echo "   See docs/deployment.md#rotating-deploy-ssh-keys for the key rotation steps."
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/id_rsa >/dev/null 2>&1; then
            echo "❌ The deploy key secret could not be parsed by ssh-keygen."
            echo "   Confirm the secret is the raw private key text, not a public key, passphrase-protected key, or malformed value."
            echo "   If using SSH_PRIVATE_KEY, try SSH_PRIVATE_KEY_B64 to avoid multiline copy/paste issues."
            echo "   See docs/deployment.md#rotating-deploy-ssh-keys for the key rotation steps."
            exit 1
          fi

      # 4. Create Release Directory
      - name: Create Release Directory
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key_path: /home/runner/.ssh/id_rsa
          port: ${{ secrets.REMOTE_PORT || 22 }}
          script: |
            # Create the release dir and api/ subfolder upfront.
            # The tarball extraction (step 6) will also create api/ — this is
            # a safety measure to guarantee it exists before the inject step.
            mkdir -p "/home/${{ secrets.REMOTE_USER }}/releases/${{ steps.timestamp.outputs.timestamp }}/api"

      # 5. Package and Sync to Release
      - name: Package and Sync to Release
        env:
          REMOTE_PORT: ${{ secrets.REMOTE_PORT || 22 }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          RELEASE_TIMESTAMP: ${{ steps.timestamp.outputs.timestamp }}
        run: |
          # Tarball the full dist/ output.
          # Already contains (copied by Vite from frontend/client/public/):
          #   ./index.html
          #   ./assets/
          #   ./.htaccess                     ← SPA routing rules
          #   ./api/imagesCloudinary.php      ← Cloudinary proxy (no secrets)
          #   ./api/luma.php                  ← Luma proxy (no secrets)
          #   ./analytics.js
          #   ./robots.txt
          tar -czf release.tar.gz -C dist .

          scp -P "${REMOTE_PORT:-22}" \
            -o StrictHostKeyChecking=yes \
            release.tar.gz \
            "${REMOTE_USER}@${REMOTE_HOST}:/home/${REMOTE_USER}/releases/${RELEASE_TIMESTAMP}/"

      # 6. Extract Release on Server
      - name: Extract Release on Server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key_path: /home/runner/.ssh/id_rsa
          port: ${{ secrets.REMOTE_PORT || 22 }}
          script: |
            cd "/home/${{ secrets.REMOTE_USER }}/releases/${{ steps.timestamp.outputs.timestamp }}"
            tar -xzf release.tar.gz
            rm release.tar.gz

      # 7. Inject Shared Secrets onto Server
      #
      # WHY: Both imagesCloudinary.php and luma.php need Cloudinary credentials
      # to sign API requests. Credentials must never be in the repo or dist/.
      #
      # HOW: A PHP constants file (secrets.env.php) is written to a SHARED location
      # OUTSIDE public_html for maximum security and zero-downtime rotation.
      # Location: /home/${{ secrets.REMOTE_USER }}/config/secrets.env.php
      - name: Inject Shared Secrets onto Server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          CLD_CLOUD_NAME: ${{ secrets.CLD_CLOUD_NAME }}
          CLD_API_KEY: ${{ secrets.CLD_API_KEY }}
          CLD_API_SECRET: ${{ secrets.CLD_API_SECRET }}
          PROXY_API_TOKEN: ${{ secrets.PROXY_API_TOKEN }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key_path: /home/runner/.ssh/id_rsa
          port: ${{ secrets.REMOTE_PORT || 22 }}
          envs: CLD_CLOUD_NAME,CLD_API_KEY,CLD_API_SECRET,PROXY_API_TOKEN
          script: |
            set -euo pipefail

            CONFIG_DIR="/home/${{ secrets.REMOTE_USER }}/config"
            ENV_FILE="${CONFIG_DIR}/secrets.env.php"

            # Create config directory with restricted permissions
            mkdir -p "$CONFIG_DIR"
            chmod 700 "$CONFIG_DIR"

            # Step 0: Validate secrets
            for var in CLD_CLOUD_NAME CLD_API_KEY CLD_API_SECRET PROXY_API_TOKEN; do
              val="${!var}"
              if [[ -z "${val}" || "${val}" =~ [$'\n'$'\r'$'\0'] ]]; then
                echo "❌ ERROR: Secret $var is empty or contains forbidden control characters (LF, CR, NULL) — aborting deploy"
                exit 1
              fi
            done

            # Step A: Properly escape only PHP single-quote content (escape \ and ') before writing
            SAFE_CLOUD_NAME="${CLD_CLOUD_NAME//\\/\\\\}"
            SAFE_CLOUD_NAME="${SAFE_CLOUD_NAME//\'/\\\'}"
            SAFE_API_KEY="${CLD_API_KEY//\\/\\\\}"
            SAFE_API_KEY="${SAFE_API_KEY//\'/\\\'}"
            SAFE_API_SECRET="${CLD_API_SECRET//\\/\\\\}"
            SAFE_API_SECRET="${SAFE_API_SECRET//\'/\\\'}"
            SAFE_PROXY_TOKEN="${PROXY_API_TOKEN//\\/\\\\}"
            SAFE_PROXY_TOKEN="${SAFE_PROXY_TOKEN//\'/\\\'}"

            # Step B: Generate the file atomically
            cat > "${ENV_FILE}.tmp" <<-EOF
            <?php
            // ---------------------------------------------------------------
            // SHARED SECRETS - Generated by GitHub Actions
            // DO NOT edit manually — overwritten on every deploy.
            // ---------------------------------------------------------------
            define('CLD_CLOUD_NAME', '${SAFE_CLOUD_NAME}');
            define('CLD_API_KEY',    '${SAFE_API_KEY}');
            define('CLD_API_SECRET', '${SAFE_API_SECRET}');
            define('PROXY_API_TOKEN', '${SAFE_PROXY_TOKEN}');
            EOF

            chmod 600 "${ENV_FILE}.tmp"
            mv "${ENV_FILE}.tmp" "$ENV_FILE"

            # Step D: Confirm file exists
            if [ -f "$ENV_FILE" ]; then
              echo "✅ Shared secrets updated at ${ENV_FILE}"
            else
              echo "❌ ERROR: Shared secrets were not created — aborting deploy"
              exit 1
            fi

      # 8. Atomically Switch Symlink
      - name: Atomically Switch Symlink
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key_path: /home/runner/.ssh/id_rsa
          port: ${{ secrets.REMOTE_PORT || 22 }}
          script: |
            set -euo pipefail

            # Paths
            RELEASE_DIR="/home/${{ secrets.REMOTE_USER }}/releases/${{ steps.timestamp.outputs.timestamp }}"
            TARGET_LINK="${{ secrets.REMOTE_PATH }}"
            TMP_LINK="${TARGET_LINK}.tmp"

            echo "Deploying release: ${{ steps.timestamp.outputs.timestamp }}"

            # 1. Safety Check: If target exists and is not a symlink, abort
            if [ -e "$TARGET_LINK" ] && [ ! -L "$TARGET_LINK" ]; then
              echo "CRITICAL ERROR: $TARGET_LINK exists and is not a symbolic link."
              echo "Atomic deployment requires this path to be a symbolic link."
              echo "Please manually rename or remove the existing entry: mv $TARGET_LINK ${TARGET_LINK}_old"
              exit 1
            fi

            # 2. Atomic Switch
            ln -sfn "$RELEASE_DIR" "$TMP_LINK"
            mv -Tf "$TMP_LINK" "$TARGET_LINK"

            # 3. Cleanup: Keep only last 5 releases
            echo "Cleaning up old releases..."
            cd "/home/${{ secrets.REMOTE_USER }}/releases"
            ls -1t | tail -n +6 | tr '\n' '\0' | xargs -0 -r rm -rf 2>/dev/null || true

            echo "✅ Deployment successful."

  notify:
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      # Use the release timestamp from deploy job
      - name: Set Release Timestamp
        run: |
          TS="${{ needs.deploy.outputs.release_timestamp }}"
          if [ -z "$TS" ]; then TS="${{ github.run_id }}"; fi
          echo "RELEASE_TIMESTAMP=$TS" >> "$GITHUB_ENV"

      # Send Success Email
      - name: Send Success Email
        if: ${{ needs.build.result == 'success' && needs.deploy.result == 'success' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ Production Deployment Successful - ${{ github.repository }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            🎉 Congratulations! Your production deployment was successful.

            📦 Deployment Details:
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            Repository:    ${{ github.repository }}
            Branch:        ${{ github.ref_name }}
            Environment:   production
            Release ID:    ${{ env.RELEASE_TIMESTAMP }}
            Commit SHA:    ${{ github.sha }}
            Triggered by:  ${{ github.actor }}

            🔗 Links:
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            Workflow Run:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit:        ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}

            ✨ Your application is now live! 🚀

            ---
            This is an automated message from GitHub Actions (c) Nairobi DevOps.

      # Send Failure Email
      - name: Send Failure Email
        if: ${{ needs.build.result != 'success' || needs.deploy.result != 'success' }}
        continue-on-error: true
        uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "❌ Production Deployment Failed - ${{ github.repository }}"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.MAIL_FROM }}
          body: |
            ⚠️ Deployment to production has failed. Immediate attention required!

            📦 Deployment Details:
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            Repository:    ${{ github.repository }}
            Branch:        ${{ github.ref_name }}
            Environment:   production
            Release ID:    ${{ env.RELEASE_TIMESTAMP }}
            Commit SHA:    ${{ github.sha }}
            Triggered by:  ${{ github.actor }}

            🔗 Action Required:
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            Please review the workflow logs immediately:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Commit details:
            ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}

            🔧 Next Steps:
            1. Check the workflow logs for error details
            2. Review the commit changes
            3. Fix the issue and push a new commit or re-run the workflow

            ---
            This is an automated message from GitHub Actions (c) Nairobi DevOps.
