name: Security Validation (Reusable)

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        default: "22"
        type: string
      check-only:
        description: "Run checks only (no fixes)"
        required: false
        default: false
        type: boolean
      fail-level:
        description: "Minimum vulnerability level to fail on"
        required: false
        default: "moderate"
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  security-validation:
    name: Security and Dependency Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # Need full history for dependency review on PRs

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Lockfile Integrity
        run: |
          echo "🔒 Validating lockfile with lockfile-lint..."
          # Ensure lockfile exists
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json is required"
            exit 1
          fi
          # Use lockfile-lint for comprehensive validation
          npx lockfile-lint \
            --path package-lock.json \
            --type npm \
            --validate-https \
            --allowed-hosts npm \
            --validate-integrity \
            --validate-package-names
          echo "✅ Lockfile validation passed"

      - name: Install Dependencies
        run: |
          echo "📦 Installing dependencies..."
          npm ci --prefer-offline --no-audit --no-fund --ignore-scripts

      - name: Run NPM Audit
        id: npm-audit
        env:
          FAIL_LEVEL: ${{ inputs.fail-level }}
        run: |
          echo "🔍 Running npm audit..."

          # Validate fail-level input
          case "$FAIL_LEVEL" in
            low|moderate|high|critical) ;;
            *) echo "::error::Invalid fail-level: $FAIL_LEVEL (expected: low|moderate|high|critical)"; exit 2 ;;
          esac

          # First, generate the JSON report for the artifact upload step.
          # The `|| true` ensures this command doesn't fail the step,
          # allowing the artifact to be created even if vulnerabilities are found.
          npm audit --json > audit-results.json || true

          # Verify report exists and is not empty
          if [ ! -s audit-results.json ]; then
            echo "::error::npm audit failed to generate a report. The command may have failed."
            exit 1
          fi

          # Verify report is valid JSON (guard against registry/auth/network errors producing non-JSON output)
          node <<'EOF'
          const fs = require('fs');
          try {
            JSON.parse(fs.readFileSync('audit-results.json', 'utf8'));
          } catch (e) {
            console.error('::error::Failed to parse audit-results.json. This usually indicates a registry or network issue on the runner.');
            console.error(e.message);
            process.exit(1);
          }
          EOF

          # Now, run npm audit again, this time allowing it to fail the step
          # based on its native exit code and the specified audit level.
          # This simplifies the logic by removing manual parsing and failure checks.
          npm audit --audit-level="$FAIL_LEVEL"

          echo "✅ No vulnerabilities found at $FAIL_LEVEL level or above"

      - name: Dependency Review (PR only)
        if: github.event.pull_request != null
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          base-ref: ${{ github.event.pull_request.base.sha }}
          head-ref: ${{ github.event.pull_request.head.sha }}
          # License policy is managed in .github/dependency-review-config.yml
          # to ensure compound SPDX expressions (e.g. "ISC AND JSON AND MIT")
          # are parsed as atomic allow-list entries (not split on comma).
          # The inline allow-licenses string format does not reliably handle
          # compound expressions — use the external YAML list format instead.
          config-file: .github/dependency-review-config.yml
          # Show review summary on PR when checks fail so developers
          # understand why the scan blocked their PR.
          comment-summary-in-pr: on-failure

      - name: Upload Audit Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-audit-results
          path: frontend/audit-results.json
          retention-days: 30
          if-no-files-found: warn
