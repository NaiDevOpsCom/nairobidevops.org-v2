name: Node Engine Range Update

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-node-engine:
    name: Update frontend package.json node engine range
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund --ignore-scripts

      - id: check-engine
        name: Check and update node engine range
        run: |
          node scripts/check-node-engine.js
          if git diff --quiet package.json; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.check-engine.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Node.js engine range"
          title: "chore: update Node.js engine range"
          body: |
            This PR updates the `engines.node` field in `frontend/package.json` based on the Node requirements declared by our direct dependencies.

            If a dependency needs a newer Node release, this change keeps the project engine range aligned with that requirement.
          branch: auto/update-node-engine
          base: pre-staging
          labels: automated
