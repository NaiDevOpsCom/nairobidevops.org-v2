# File- and branch-based label rules.
# Title-based labeling is handled by pr-auto-label.yml (github-script step).

feature:
  - head-branch: ["^feat", "^feature"]

bug:
  - head-branch: ["^fix", "^bug"]

documentation:
  - changed-files:
      - any-glob-to-any-file:
          ["frontend/docs/**", "*.md", "frontend/CONTENT_GUIDE.md"]
  - head-branch: ["^docs", "^doc"]

ci/cd:
  - changed-files:
      - any-glob-to-any-file: [".github/workflows/**", ".github/actions/**"]

dependencies:
  - head-branch: ["^dependabot"]
  - changed-files:
      - any-glob-to-any-file:
          ["frontend/package.json", "frontend/package-lock.json"]

refactor:
  - head-branch: ["^refactor", "^chore"]

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.test.ts"
          - "**/*.test.tsx"
          - "**/*.spec.ts"
          - "**/__tests__/**"

security:
  - changed-files:
      - any-glob-to-any-file:
          - "frontend/docs/security/**"
          - "**/*security*"
          - "frontend/security-policy.json"
